<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Liv's Binder</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

  <h1>Liv's Binder</h1>

  <div id="nav-left" class="nav-arrow">‹</div>
  <div id="nav-right" class="nav-arrow">›</div>

  <div id="binder-wrapper">
    <div id="binder-background">
      <div id="binder"></div>
    </div>
  </div>

  <div id="card-popup" class="hidden">
    <div id="popup-content">
      <img id="popup-preview" alt="Card preview">
      <h2 id="popup-name"></h2>
      <p id="popup-price"></p>

      <label class="owned-row">
        <input type="checkbox" id="owned-checkbox"> Owned
      </label>

      <button id="close-popup">Close</button>
    </div>
  </div>

</body>
</html>
